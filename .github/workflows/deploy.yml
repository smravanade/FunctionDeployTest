name: Build and Deploy Azure Function App (Container)

# Triggers
on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual triggering from the Actions tab

# ── Required GitHub Actions secrets ─────────────────────────────────────────
# AZURE_CREDENTIALS          – JSON output of:
#                              az ad sp create-for-rbac --name "github-actions-sp" \
#                                --role contributor \
#                                --scopes /subscriptions/<sub-id>/resourceGroups/<rg> \
#                                --sdk-auth
# ACR_LOGIN_SERVER           – e.g. acrfuncapp12345.azurecr.io
# ACR_USERNAME               – ACR admin username (same as ACR name)
# ACR_PASSWORD               – ACR admin password
# AZURE_FUNCTION_APP_NAME    – name of the Function App resource
# AZURE_RESOURCE_GROUP       – resource group that contains the Function App
# ────────────────────────────────────────────────────────────────────────────

env:
  IMAGE_NAME: http-trigger

jobs:
  build-and-push:
    name: Build & Push Docker image to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions: {}

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container image to Function App
        uses: azure/cli@v2
        with:
          azcliversion: 2.58.0
          inlineScript: |
            az functionapp config container set \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_FUNCTION_APP_NAME }}" \
              --docker-custom-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}" \
              --docker-registry-server-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
              --docker-registry-server-user "${{ secrets.ACR_USERNAME }}" \
              --docker-registry-server-password "${{ secrets.ACR_PASSWORD }}"

      - name: Verify deployment (wait for app to start)
        uses: azure/cli@v2
        with:
          azcliversion: 2.58.0
          inlineScript: |
            az functionapp show \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_FUNCTION_APP_NAME }}" \
              --query "{name:name, state:state, defaultHostName:defaultHostName}" \
              --output table
