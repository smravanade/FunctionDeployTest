name: Build and Deploy Azure Function App (Container)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ── OIDC – no long-lived secrets ────────────────────────────────────────────
# Only ONE GitHub secret is required:
#   AZURE_CLIENT_ID – Client ID of a User-Assigned Managed Identity (UAMI)
#                     that has a federated credential trusting this repo.
#
# One-time setup (run locally in PowerShell):
#
#   # 1. Create the User-Assigned Managed Identity
#   $uami = az identity create `
#     --name "github-actions-uami" `
#     --resource-group "rg-funcapp-container" `
#     --location "eastus" | ConvertFrom-Json
#
#   # 2. Grant Contributor on the resource group
#   az role assignment create `
#     --role Contributor `
#     --assignee $uami.principalId `
#     --scope /subscriptions/e66b7b42-119f-40e9-a944-601f92058b7c/resourceGroups/rg-funcapp-container
#
#   # 3. Add federated credential (replace <org>/<repo> with your GitHub repo)
#   az identity federated-credential create `
#     --identity-name "github-actions-uami" `
#     --resource-group "rg-funcapp-container" `
#     --name "github-main" `
#     --issuer "https://token.actions.githubusercontent.com" `
#     --subject "repo:<org>/<repo>:ref:refs/heads/main" `
#     --audiences "api://AzureADTokenExchange"
#
#   # 4. Store $uami.clientId as the AZURE_CLIENT_ID secret in GitHub
# ────────────────────────────────────────────────────────────────────────────

env:
  AZURE_TENANT_ID:       cf36141c-ddd7-45a7-b073-111f66d0b30c
  AZURE_SUBSCRIPTION_ID: e66b7b42-119f-40e9-a944-601f92058b7c
  AZURE_RESOURCE_GROUP:  rg-funcapp-container
  ACR_NAME:              acrfuncapp7857
  ACR_LOGIN_SERVER:      acrfuncapp7857.azurecr.io
  FUNCTION_APP_NAME:     funcapp-container-7857
  IMAGE_NAME:            http-trigger

jobs:
  build-and-push:
    name: Build & Push Docker image to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required to request the OIDC JWT

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure (OIDC – no password)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR via Azure CLI (no ACR password secret needed)
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write   # required to request the OIDC JWT

    steps:
      - name: Log in to Azure (OIDC – no password)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container image to Function App
        uses: azure/cli@v2
        with:
          azcliversion: 2.58.0
          inlineScript: |
            az functionapp config container set \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --image "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Verify deployment
        uses: azure/cli@v2
        with:
          azcliversion: 2.58.0
          inlineScript: |
            az functionapp show \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --query "{name:name, state:state, defaultHostName:defaultHostName}" \
              --output table
